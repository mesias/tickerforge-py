name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_PYTHON: "3.12"

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VERSION file
        run: python3 scripts/check_versions.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch tickerforge-spec into spec/
        run: |
          git clone --depth 1 --branch main https://github.com/mesias/tickerforge-spec.git /tmp/tickerforge-spec
          cp -r /tmp/tickerforge-spec/spec .

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: matrix.python-version != env.COVERAGE_PYTHON
        run: pytest

      - name: Run tests and collect coverage
        if: matrix.python-version == env.COVERAGE_PYTHON
        run: pytest --cov=./ --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.COVERAGE_PYTHON
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
