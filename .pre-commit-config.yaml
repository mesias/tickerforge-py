repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2
          - PyYAML
          - types-PyYAML
          - python-dateutil
          - types-python-dateutil
          - exchange-calendars
          - pytest

  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest coverage
        entry: .venv/bin/python -m pytest --cov=tickerforge --cov-fail-under=80
        language: system
        types: [python]
        pass_filenames: false
